<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Modern Blocks</title>
  <style>
    :root {
      --ink: #0f172a;
      --muted: #52607a;
      --line: #d8e2ef;
      --brand: #0ea5e9;
      --brand-2: #14b8a6;
      --panel: #f8fbff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Roboto, sans-serif;
      color: var(--ink);
      background: linear-gradient(160deg, #e8f3ff, #f4fffb 48%, #eef2ff 100%);
    }

    .cv {
      width: min(960px, 100%);
      min-height: 1120px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #cfe0ee;
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 20px 44px rgba(15, 23, 42, 0.11);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .hero {
      background: linear-gradient(120deg, #0ea5e9, #14b8a6);
      color: #fff;
      padding: 20px 24px;
      display: grid;
      grid-template-columns: 168px 1fr;
      gap: 18px;
      align-items: center;
    }

    .avatar-wrap {
      appearance: none;
      border: 2px solid rgba(255, 255, 255, 0.55);
      background: transparent;
      border-radius: 18px;
      overflow: hidden;
      width: 160px;
      height: 160px;
      padding: 0;
      margin: 0;
      position: relative;
      cursor: pointer;
    }

    .avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar-overlay {
      position: absolute;
      inset: auto 0 0 0;
      background: linear-gradient(180deg, transparent, rgba(2, 8, 23, 0.82));
      text-align: center;
      padding: 8px;
      font-size: 11px;
      font-weight: 700;
    }

    .hero small {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.92;
      font-weight: 800;
    }

    .hero h1 {
      margin: 6px 0 0;
      font-size: 40px;
      line-height: 0.98;
      letter-spacing: -0.02em;
    }

    .hero h2 {
      margin: 6px 0 0;
      font-size: 20px;
      font-weight: 600;
    }

    .hero p {
      margin: 10px 0 0;
      max-width: 620px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .content {
      display: grid;
      grid-template-columns: 1.1fr 1.6fr;
      gap: 16px;
      padding: 18px;
    }

    .col {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .block {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }

    .block h3 {
      margin: 0 0 10px;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #0369a1;
      font-weight: 800;
    }

    .text {
      margin: 0;
      font-size: 14px;
      color: #1f2f46;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .contact-grid {
      display: grid;
      gap: 10px;
    }

    .contact-item {
      background: #fff;
      border: 1px solid #d9e7f3;
      border-radius: 12px;
      padding: 10px;
    }

    .contact-label {
      display: block;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: #64748b;
      font-weight: 800;
      margin-bottom: 3px;
    }

    .contact-value {
      display: block;
      font-size: 14px;
      color: #0f172a;
      line-height: 1.45;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chips span {
      display: inline-flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #d0e3f2;
      color: #0b496c;
      font-size: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <article class="cv">
    <header class="hero">
      <button id="avatarButton" type="button" class="avatar-wrap no-print" data-cv-avatar-trigger="1" aria-label="Đổi ảnh đại diện">
        <img id="avatarImage" src="{{avatarUrl}}" alt="Avatar" data-cv-avatar="1" data-image-editable="avatarImage" />
        <span class="avatar-overlay">Click để đổi ảnh</span>
      </button>

      <div>
        <small data-editable="true" data-cv-field="title">{{title}}</small>
        <h1 data-editable="true" data-cv-field="name">{{name}}</h1>
        <h2 data-editable="true" data-cv-field="position">{{position}}</h2>
        <p data-editable="true" data-cv-field="summary">{{summary}}</p>
      </div>
    </header>

    <div class="content">
      <aside class="col">
        <section class="block">
          <h3>Liên hệ</h3>
          <div class="contact-grid">
            <div class="contact-item">
              <span class="contact-label">Số điện thoại</span>
              <span class="contact-value" data-editable="true" data-cv-field="phone">{{phone}}</span>
            </div>
            <div class="contact-item">
              <span class="contact-label">Email</span>
              <span class="contact-value" data-editable="true" data-cv-field="email">{{email}}</span>
            </div>
            <div class="contact-item">
              <span class="contact-label">Địa chỉ</span>
              <span class="contact-value" data-editable="true" data-cv-field="address">{{address}}</span>
            </div>
            <div class="contact-item">
              <span class="contact-label">LinkedIn</span>
              <span class="contact-value" data-editable="true" data-cv-field="linkedin">{{link}}</span>
            </div>
          </div>
        </section>

        <section class="block">
          <h3>Kỹ năng</h3>
          <p class="text" data-editable="true" data-cv-field="skills">{{skills}}</p>
        </section>

        <section class="block">
          <h3>Ngoại ngữ</h3>
          <p class="text" data-editable="true" data-cv-field="languages">{{languages}}</p>
        </section>
      </aside>

      <main class="col">
        <section class="block">
          <h3>Kinh nghiệm</h3>
          <p class="text" data-editable="true" data-cv-field="experience">{{experience}}</p>
        </section>

        <section class="block">
          <h3>Học vấn</h3>
          <p class="text" data-editable="true" data-cv-field="education">{{education}}</p>
        </section>

        <section class="block">
          <h3>Dự án</h3>
          <p class="text" data-editable="true" data-cv-field="projects">{{projects}}</p>
        </section>
      </main>
    </div>
  </article>
</body>
</html>
