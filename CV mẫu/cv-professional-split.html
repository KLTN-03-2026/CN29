<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Professional Split</title>
  <style>
    :root {
      --ink: #0b1e35;
      --muted: #5f7088;
      --line: #d6e0ea;
      --brand: #0f4c81;
      --brand-2: #168aad;
      --paper: #ffffff;
      --side: #f1f6fb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #eaf0f5;
      color: var(--ink);
    }

    .cv {
      max-width: 960px;
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid #c9d8e6;
      border-radius: 24px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: 1120px;
    }

    .side {
      background: var(--side);
      border-right: 1px solid var(--line);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .avatar-wrap {
      appearance: none;
      border: none;
      background: transparent;
      width: 180px;
      height: 180px;
      margin: 0 auto;
      padding: 0;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }

    .avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar-overlay {
      position: absolute;
      inset: auto 0 0 0;
      padding: 9px;
      text-align: center;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      background: linear-gradient(180deg, transparent, rgba(5, 22, 40, 0.82));
    }

    .name {
      margin: 4px 0 0;
      font-size: 30px;
      line-height: 1.08;
      letter-spacing: -0.02em;
      font-weight: 800;
      color: #0f2d4c;
    }

    .position {
      margin-top: 6px;
      color: var(--brand);
      font-size: 17px;
      font-weight: 700;
    }

    .contact {
      border-top: 1px dashed #afc3d8;
      padding-top: 14px;
      display: grid;
      gap: 10px;
    }

    .label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 800;
      color: #48627d;
      margin-bottom: 3px;
    }

    .contact-value {
      display: block;
      font-size: 14px;
      color: #0a233d;
      line-height: 1.4;
    }

    .block {
      border: 1px solid #d1dde9;
      border-radius: 16px;
      padding: 12px;
      background: #fff;
    }

    .block h3 {
      margin: 0 0 8px;
      font-size: 14px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: #245889;
    }

    .block p {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      color: #1c3854;
    }

    .main {
      padding: 24px 24px 28px;
      display: grid;
      gap: 16px;
      align-content: start;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    }

    .headline {
      border-bottom: 2px solid #c8d9ea;
      padding-bottom: 12px;
      margin-bottom: 4px;
    }

    .headline small {
      color: var(--brand-2);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 800;
      font-size: 11px;
    }

    .headline h1 {
      margin: 6px 0 0;
      font-size: 26px;
      color: #10385c;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 15px;
      color: #174e7f;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .card div {
      font-size: 14px;
      line-height: 1.65;
      color: #142f4b;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <article class="cv">
    <aside class="side">
      <button id="avatarButton" type="button" class="avatar-wrap no-print" data-cv-avatar-trigger="1" aria-label="Đổi ảnh đại diện">
        <img id="avatarImage" src="{{avatarUrl}}" alt="Avatar" data-cv-avatar="1" data-image-editable="avatarImage" />
        <span class="avatar-overlay">Click để đổi ảnh</span>
      </button>

      <h1 class="name" data-editable="true" data-cv-field="name">{{name}}</h1>
      <div class="position" data-editable="true" data-cv-field="position">{{position}}</div>

      <section class="contact">
        <div>
          <span class="label">Số điện thoại</span>
          <span class="contact-value" data-editable="true" data-cv-field="phone">{{phone}}</span>
        </div>
        <div>
          <span class="label">Email</span>
          <span class="contact-value" data-editable="true" data-cv-field="email">{{email}}</span>
        </div>
        <div>
          <span class="label">Địa chỉ</span>
          <span class="contact-value" data-editable="true" data-cv-field="address">{{address}}</span>
        </div>
        <div>
          <span class="label">LinkedIn</span>
          <span class="contact-value" data-editable="true" data-cv-field="linkedin">{{link}}</span>
        </div>
      </section>

      <section class="block">
        <h3>Kỹ năng</h3>
        <p data-editable="true" data-cv-field="skills">{{skills}}</p>
      </section>

      <section class="block">
        <h3>Ngoại ngữ</h3>
        <p data-editable="true" data-cv-field="languages">{{languages}}</p>
      </section>
    </aside>

    <main class="main">
      <header class="headline">
        <small data-editable="true" data-cv-field="title">{{title}}</small>
        <h1 data-editable="true" data-cv-field="summary">{{summary}}</h1>
      </header>

      <section class="card">
        <h2>Kinh nghiệm</h2>
        <div data-editable="true" data-cv-field="experience">{{experience}}</div>
      </section>

      <section class="card">
        <h2>Học vấn</h2>
        <div data-editable="true" data-cv-field="education">{{education}}</div>
      </section>

      <section class="card">
        <h2>Dự án</h2>
        <div data-editable="true" data-cv-field="projects">{{projects}}</div>
      </section>
    </main>
  </article>
</body>
</html>
